camera:
  device_index: 0
  width: 1280
  height: 720
  fps: 30
  buffer_size: 1

dataset:
  classes:
    - human
    - apple
    - banana
    - orange
    - cat
    - dog
    - bottle
    - phone
    - keyboard
    - laptop
  image_size: [640, 640]
  val_split: 0.2
  min_images_per_class: 20
  augmentation_enabled: true

training:
  epochs: 50
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.0001
  image_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.45
  patience: 10
  warmup_epochs: 3
  model_name: yolov8n.pt
  pretrained: true
  freeze_backbone_epochs: 5
  save_every_n_epochs: 5
  use_amp: true
  num_workers: 4

inference:
  confidence_threshold: 0.4
  iou_threshold: 0.45
  max_detections: 100
  frame_skip: 0
  use_onnx: false
  device: auto
